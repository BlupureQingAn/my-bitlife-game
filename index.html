<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生模拟器 · 文游版</title>
    <style>
        /* ==================== 变量层（Design Tokens） ==================== */
        :root {
            --bg-main: #efe3cf;
            --bg-soft: #f7eedf;
            --card: #fff7ea;
            --line: #e2ccb0;
            --text: #4b3a2a;
            --sub: #806a55;
            --accent: #b08652;
            --accent-dark: #845f35;
            --shadow: 0 6px 18px rgba(128, 106, 85, 0.15);
            --radius: 16px;
        }

        /* ==================== 布局层（Base / Layout） ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(180deg, #f2e6d5 0%, #e6d7c1 100%);
            display: flex;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            color: var(--text);
        }

        #app {
            width: 100%;
            max-width: 820px;
            height: 100%;
            background: var(--bg-main);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 26px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .bear-layer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .header,
        .content,
        .chat-footer {
            position: relative;
            z-index: 2;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 6px;
            scroll-behavior: smooth;
        }

        .composer {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .setting-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .nav-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .timeline-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .gender-actions {
            display: flex;
            gap: 8px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* ==================== 组件层（UI Components） ==================== */
        /* ---- 状态组件（Status Components） ---- */
        /* 容器 */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--line);
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 12px;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(4, minmax(70px, 1fr));
        }

        .stat-item {
            background: var(--bg-soft);
            border-radius: 10px;
            text-align: center;
            padding: 8px 4px;
            font-size: 0.8rem;
            color: var(--sub);
        }

        /* 文本 */
        .header h1 {
            font-size: 1.05rem;
            color: var(--accent-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header p {
            margin-top: 4px;
            color: var(--sub);
            font-size: 0.83rem;
        }

        .wealth {
            color: #a46f35;
            font-weight: 700;
            white-space: nowrap;
        }

        .stat-item span {
            display: block;
            font-size: 1.05rem;
            color: var(--accent-dark);
            font-weight: 700;
        }

        /* ---- 设置组件（Settings Components） ---- */
        /* 容器 */
        .api-config h4 {
            color: var(--accent-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 0.92rem;
        }

        .api-config input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fffdfa;
            padding: 10px;
            font-size: 0.86rem;
            margin-top: 8px;
        }

        .scenario-editor {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fffdfa;
            padding: 10px;
            font-size: 0.84rem;
            line-height: 1.45;
            margin-top: 8px;
            min-height: 120px;
            resize: vertical;
        }

        .scenario-hint {
            margin-top: 6px;
            color: var(--sub);
            font-size: 0.75rem;
        }

        /* 交互态 */
        .mini-btn {
            border: 0;
            border-radius: 10px;
            padding: 9px 10px;
            cursor: pointer;
            flex: 1;
            font-weight: 600;
            font-size: 0.82rem;
        }

        .mini-btn.primary {
            background: var(--accent);
            color: #fff;
        }

        .mini-btn.ghost {
            background: #f3e5d2;
            color: var(--text);
        }

        /* ---- 聊天组件（Chat Components） ---- */
        /* 容器 */
        .story-log {
            margin-bottom: 8px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fffdf8;
            padding: 10px;
        }

        .msg-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 20px;
            flex-shrink: 0;
            animation: petBlink 2.8s ease-in-out infinite;
        }

        .bubble {
            max-width: calc(100% - 50px);
            padding: 9px 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.55;
            overflow-wrap: anywhere;
            white-space: normal;
        }

        .choice-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .chat-footer {
            background: #fff7ea;
            border-top: 1px solid var(--line);
            padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        }

        /* 文本 */
        .story-date {
            color: var(--sub);
            font-size: 0.75rem;
            margin-bottom: 6px;
        }

        .avatar.ai {
            background: #231f20;
            color: #ffd7eb;
            border: 2px solid #ffc4e2;
        }

        .avatar.user {
            background: #ffd5ea;
            color: #2d2126;
            border: 2px solid #ffb3d8;
        }

        .bubble.ai {
            background: #fff7ef;
            border: 1px solid var(--line);
        }

        .bubble.user {
            background: #ffe0ef;
            border: 1px solid #efb5d1;
        }

        .bubble h1, .bubble h2, .bubble h3 {
            font-size: 0.95rem;
            margin: 4px 0 6px;
        }

        .bubble ul, .bubble ol {
            padding-left: 18px;
            margin: 4px 0;
        }

        .bubble code {
            background: #f5ead9;
            border-radius: 6px;
            padding: 1px 4px;
            font-size: 0.82rem;
        }

        .bubble pre {
            background: #f5ead9;
            border-radius: 8px;
            padding: 8px;
            overflow-x: auto;
            margin: 6px 0;
        }

        /* 交互态 */
        .msg-row.user {
            justify-content: flex-end;
        }

        .choice-btn {
            border: 1px solid var(--line);
            background: #fff6eb;
            border-radius: 999px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .quick-btn {
            flex: 1;
            border: 0;
            border-radius: 999px;
            padding: 8px 8px;
            background: #efd5b6;
            color: #5d4328;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .nav-btn {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 8px;
            background: #f8ecdc;
            color: #6a4f31;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .nav-btn.active {
            background: #e7c49a;
            color: #4f371f;
        }

        .list-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            margin-bottom: 8px;
            background: #fffdf8;
        }

        .list-title {
            font-size: 0.88rem;
            color: var(--accent-dark);
            font-weight: 700;
        }

        .list-sub {
            font-size: 0.76rem;
            color: var(--sub);
            margin-top: 3px;
        }

        .tiny-btn {
            border: 1px solid var(--line);
            background: #fff2df;
            color: #644a2f;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .social-chat-box {
            margin-top: 8px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fffdf9;
            padding: 8px;
            max-height: 220px;
            overflow-y: auto;
        }

        .npc-msg {
            font-size: 0.82rem;
            line-height: 1.45;
            margin-bottom: 8px;
        }

        .npc-msg.me {
            color: #7a4d6a;
        }

        .npc-msg.npc {
            color: #5d4a3b;
        }

        .slot-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .composer textarea {
            flex: 1;
            min-height: 42px;
            max-height: 120px;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 8px 10px;
            background: #fffdf8;
            resize: none;
            font-size: 0.9rem;
            line-height: 1.35;
        }

        .send-btn {
            border: 0;
            background: var(--accent);
            color: #fff;
            border-radius: 12px;
            width: 86px;
            height: 42px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }

        .send-btn:disabled,
        .quick-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ---- 弹窗组件（Modal Components） ---- */
        /* 容器 */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 10;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 14px;
        }

        .modal-card {
            width: 100%;
            max-width: 420px;
            background: #fff8ed;
            border-radius: 16px;
            border: 1px solid var(--line);
            padding: 14px;
        }

        /* 文本 */
        .modal-title {
            color: var(--accent-dark);
            margin-bottom: 6px;
            font-size: 1rem;
            font-weight: 700;
        }

        .modal-desc {
            color: var(--sub);
            font-size: 0.88rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        /* ==================== 动效层（Animations / Motion） ==================== */
        .bear {
            position: absolute;
            top: -50px;
            font-size: 18px;
            opacity: 0.55;
            animation: fall linear infinite;
            user-select: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-5vh) rotate(0deg);
            }
            100% {
                transform: translateY(110vh) rotate(240deg);
            }
        }

        @keyframes petBlink {
            0%, 88%, 100% { transform: translateY(0); }
            92% { transform: translateY(-2px) scale(1.03); }
            96% { transform: translateY(0) scale(1); }
        }

        .event-flash {
            animation: eventFlash 0.9s ease;
        }

        @keyframes eventFlash {
            0% { box-shadow: 0 0 0 rgba(255, 173, 66, 0); }
            30% { box-shadow: 0 0 0 4px rgba(255, 173, 66, 0.35); }
            100% { box-shadow: 0 0 0 rgba(255, 173, 66, 0); }
        }

        .streaming-cursor {
            display: inline-block;
            width: 6px;
            height: 14px;
            background: var(--accent-dark);
            margin-left: 3px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ==================== 响应式层（Responsive） ==================== */
        @media (max-width: 560px) {
            .header h1 {
                font-size: 0.96rem;
            }
            .header p,
            .wealth {
                font-size: 0.76rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, minmax(100px, 1fr));
            }
            .send-btn {
                width: 72px;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="bear-layer" id="bear-layer"></div>

    <header class="header">
        <div>
            <h1 id="ui-name">🐾 徐然（Blupure）</h1>
            <p id="ui-basic-info">📍 洛杉矶, 美国 | 🎂 0岁 | 📅 1995年1月</p>
        </div>
        <div class="wealth" id="ui-wealth">💰 $500,000</div>
    </header>

    <main class="content" id="main-content">
        <section class="card stats-grid">
            <div class="stat-item"><span id="ui-health">85</span>健康 ❤️</div>
            <div class="stat-item"><span id="ui-intellect">90</span>智力 🧠</div>
            <div class="stat-item"><span id="ui-charisma">88</span>魅力 ✨</div>
            <div class="stat-item"><span id="ui-luck">75</span>运气 🍀</div>
        </section>

        <section class="card api-config">
            <h4 onclick="toggleConfig()">
                <span>⚙️ 核心驱动设置（点击展开）</span>
                <span id="config-arrow">▼</span>
            </h4>
            <div id="config-body" style="display:none;">
                <input type="text" id="api-url" placeholder="上游API URL（例如: https://integrate.api.nvidia.com/v1）">
                <input type="password" id="api-key" placeholder="API Key">
                <input type="text" id="api-model" placeholder="模型名 (例如: gpt-4o-mini)">
                <textarea id="scenario-editor" class="scenario-editor" placeholder="在这里粘贴文游设定剧本（建议放 bitlife-docx-text 的纯文本版）"></textarea>
                <div class="scenario-hint">设定解耦：聊天引擎只读取这里的设定文本，其它模块不再混入剧情规则。</div>
                <div class="setting-actions">
                    <button class="mini-btn primary" onclick="saveSettings()">保存配置</button>
                    <button class="mini-btn ghost" onclick="importScenarioTxt()">导入设定TXT</button>
                    <button class="mini-btn ghost" onclick="openRebornModal()">重新投胎</button>
                </div>
                <input id="scenario-file-input" type="file" accept=".txt,.md,.text" style="display:none;">
            </div>
        </section>

        <section id="view-main" class="view-section active">
            <section class="card" id="story-board"></section>
        </section>

        <section id="view-inventory" class="view-section">
            <section class="card">
                <div class="list-title">🎒 背包物品</div>
                <div id="inventory-list" style="margin-top:8px;"></div>
            </section>
        </section>

        <section id="view-social" class="view-section">
            <section class="card">
                <div class="list-title">💬 社交（类似微信单聊）</div>
                <div id="social-list" style="margin-top:8px;"></div>
                <div id="social-chat-panel" style="display:none; margin-top:10px;">
                    <div class="list-row">
                        <div>
                            <div class="list-title" id="social-chat-title">与NPC聊天</div>
                            <div class="list-sub" id="social-chat-sub"></div>
                        </div>
                        <button class="tiny-btn" id="social-avatar-btn">查看状态</button>
                    </div>
                    <div class="social-chat-box" id="social-chat-box"></div>
                    <div class="composer" style="margin-top:8px;">
                        <textarea id="social-input" placeholder="给这个NPC发消息"></textarea>
                        <button class="send-btn" onclick="sendNpcMessage()">发送</button>
                    </div>
                </div>
            </section>
        </section>

        <section id="view-saves" class="view-section">
            <section class="card">
                <div class="list-title">💾 存档槽位（5个）</div>
                <div class="slot-grid" id="save-slots" style="margin-top:8px;"></div>
            </section>
        </section>
    </main>

    <footer class="chat-footer">
        <div class="nav-actions">
            <button class="nav-btn active" data-view="view-main" onclick="switchView('view-main')">📖 生涯</button>
            <button class="nav-btn" data-view="view-inventory" onclick="switchView('view-inventory')">🎒 背包</button>
            <button class="nav-btn" data-view="view-social" onclick="switchView('view-social')">💬 社交</button>
            <button class="nav-btn" data-view="view-saves" onclick="switchView('view-saves')">💾 存档</button>
        </div>
        <div class="quick-actions">
            <button class="quick-btn" id="btn-next-month" onclick="sendUserText('下一月')">⏭ 下一月</button>
            <button class="quick-btn" onclick="sendUserText('继续')">▶ 继续</button>
        </div>
        <div class="timeline-actions">
            <button class="quick-btn" onclick="jumpWeek(-1)">⏪ 上一周</button>
            <button class="quick-btn" onclick="jumpWeek(1)">⏩ 下一周</button>
        </div>
        <div class="composer">
            <textarea id="chat-input" placeholder="和黑猫猫/粉猫猫说点什么吧～"></textarea>
            <button class="send-btn" id="send-btn" onclick="onSendClick()">发送</button>
        </div>
    </footer>

    <div class="modal-overlay" id="reborn-modal">
        <div class="modal-card">
            <div class="modal-title">重新投胎</div>
            <div class="modal-desc">请选择新人生性别（会清空当前存档）</div>
            <div class="gender-actions">
                <button class="mini-btn primary" onclick="resetGameWithGender('男')">男</button>
                <button class="mini-btn primary" onclick="resetGameWithGender('女')">女</button>
                <button class="mini-btn ghost" onclick="resetGameWithGender('非二元')">非二元</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="info-modal">
        <div class="modal-card">
            <div class="modal-title" id="info-modal-title">详情</div>
            <div class="modal-desc" id="info-modal-desc"></div>
            <div class="gender-actions">
                <button class="mini-btn ghost" onclick="closeInfoModal()">关闭</button>
                <button class="mini-btn primary" id="info-modal-action" style="display:none;">确认</button>
            </div>
        </div>
    </div>
</div>

<script>
    const AppConfig = {
        storageKeys: {
            save: "bitlife_save",
            apiUrl: "bitlife_api_url",
            apiKey: "bitlife_api_key",
            apiModel: "bitlife_api_model",
            nameRegistry: "bitlife_used_name_registry_v1",
            scenarioText: "bitlife_scenario_text_v1",
            saveSlotPrefix: "bitlife_save_slot_"
        },
        identityPools: {
            cnNames: ["林澈", "沈知夏", "顾言川", "苏见微", "江望舒", "程以宁", "许星野", "周晚棠", "梁初言", "宋栖月", "叶云舟", "季明川", "陆听岚", "秦若禾"],
            enNames: ["Aster", "Lumi", "Noah", "Iris", "Theo", "Mira", "Elio", "Nora", "Ciel", "Arden", "Lena", "Riven", "Milo", "Sylvia"],
            birthPlaces: [
                { nationality: "美国", locations: ["洛杉矶", "纽约", "西雅图", "波士顿"] },
                { nationality: "英国", locations: ["伦敦", "曼彻斯特", "利物浦"] },
                { nationality: "加拿大", locations: ["多伦多", "温哥华", "蒙特利尔"] },
                { nationality: "法国", locations: ["巴黎", "里昂", "马赛"] },
                { nationality: "日本", locations: ["东京", "大阪", "横滨"] },
                { nationality: "澳大利亚", locations: ["悉尼", "墨尔本", "布里斯班"] },
                { nationality: "新加坡", locations: ["新加坡市"] },
                { nationality: "中国", locations: ["上海", "广州", "杭州", "成都"] }
            ]
        },
        defaultApi: {
            url: "https://integrate.api.nvidia.com/v1",
            model: "gpt-4o-mini"
        },
        proxy: {
            baseUrl: "https://my-openai-proxy.x18325986.workers.dev"
        },
        defaultScenario: [
            "你是人生模拟器文游引擎。",
            "必须严格根据玩家最新输入回复，不可脱离输入自说自话。",
            "保持现代现实世界，不要超自然、科幻、血腥。",
            "输出中要包含：当前时间、状态变化、剧情对话。",
            "可以加入适量emoji、颜文字，以及（AI想法：...）。",
            "事件偏日常、成长缓慢、年龄逻辑严格、叙事连贯。"
        ].join("\n")
    };

    const Utils = {
        weekdays: ["周一", "周二", "周三", "周四", "周五", "周六", "周日"],
        deepClone(obj) {
            return JSON.parse(JSON.stringify(obj));
        },
        pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        },
        nowDateStr(state) {
            const weekName = this.weekdays[state.weekdayIndex || 0];
            return `${state.currentYear}年${state.currentMonth}月${state.currentDay || 1}日 ${weekName}`;
        },
        shiftDays(state, deltaDays) {
            if (!Number.isFinite(deltaDays) || !state) return;
            state.currentDay = state.currentDay || 1;
            state.weekdayIndex = state.weekdayIndex || 0;
            let remain = deltaDays;
            const step = remain > 0 ? 1 : -1;
            while (remain !== 0) {
                state.currentDay += step;
                state.weekdayIndex = (state.weekdayIndex + step + 7) % 7;
                if (state.currentDay > 30) {
                    state.currentDay = 1;
                    state.currentMonth += 1;
                    if (state.currentMonth > 12) {
                        state.currentMonth = 1;
                        state.currentYear += 1;
                    }
                } else if (state.currentDay < 1) {
                    state.currentDay = 30;
                    state.currentMonth -= 1;
                    if (state.currentMonth < 1) {
                        state.currentMonth = 12;
                        state.currentYear -= 1;
                    }
                }
                remain -= step;
            }
        }
    };

            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (e) {
                return fallback;
            }
        }
        function writeJson(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }
        function readText(key, fallback = "") {
            return localStorage.getItem(key) || fallback;
        }
        function writeText(key, value) {
            localStorage.setItem(key, value);
        }
        return { readJson, writeJson, readText, writeText };
    })();

        function loadRegistry() {
            return StorageService.readJson(AppConfig.storageKeys.nameRegistry, { cnNames: [], enNames: [], fullNames: [] });
        }
        function saveRegistry(registry) {
            StorageService.writeJson(AppConfig.storageKeys.nameRegistry, registry);
        }
        function pickUniqueName(pool, used) {
            const usedSet = new Set(used);
            const candidates = pool.filter((n) => !usedSet.has(n));
            return candidates.length ? Utils.pickRandom(candidates) : null;
        }
        function uniqueIdentityNames() {
            const registry = loadRegistry();
            let cn = pickUniqueName(AppConfig.identityPools.cnNames, registry.cnNames);
            let en = pickUniqueName(AppConfig.identityPools.enNames, registry.enNames);
            if (!cn) cn = `${Utils.pickRandom(AppConfig.identityPools.cnNames)}${registry.cnNames.length + 1}`;
            if (!en) en = `${Utils.pickRandom(AppConfig.identityPools.enNames)}-${registry.enNames.length + 1}`;
            if (registry.fullNames.includes(`${cn}|${en}`)) cn = `${cn}${Math.floor(Math.random() * 999)}`;
            registry.cnNames.push(cn);
            registry.enNames.push(en);
            registry.fullNames.push(`${cn}|${en}`);
            saveRegistry(registry);
            return { cn, en };
        }
        function generateIdentity() {
            const region = Utils.pickRandom(AppConfig.identityPools.birthPlaces);

    const MarkdownService = (() => {
        function escapeHtml(str) {
            return (str || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
        function render(md) {
            let html = escapeHtml(md);
            html = html.replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>");
            html = html.replace(/`([^`\n]+)`/g, "<code>$1</code>");
            html = html.replace(/^### (.*)$/gm, "<h3>$1</h3>");
            html = html.replace(/^## (.*)$/gm, "<h2>$1</h2>");
            html = html.replace(/^# (.*)$/gm, "<h1>$1</h1>");
            html = html.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            html = html.replace(/\*(.*?)\*/g, "<em>$1</em>");
            html = html.replace(/^\> (.*)$/gm, "<blockquote>$1</blockquote>");
            html = html.replace(/(?:^|\n)- (.*)(?=\n|$)/g, "\n<li>$1</li>");
            html = html.replace(/(?:^|\n)\d+[.)] (.*)(?=\n|$)/g, "\n<li>$1</li>");
            html = html.replace(/(<li>[\s\S]*?<\/li>)/g, "<ul>$1</ul>");
            html = html.replace(/<\/ul>\s*<ul>/g, "");
            html = html.replace(/\n/g, "<br>");
            return html;
        }
        return { render };
    })();

    const ChoiceService = (() => {
        function extractChoices(text) {
            const lines = String(text || "").split("\n").map((s) => s.trim()).filter(Boolean);
            const choices = [];
            for (const line of lines) {
                const m = line.match(/^\d+[.)、]\s+(.+)$/);
                if (!m) continue;
                const choiceText = m[1].trim();
                if (choiceText.length <= 28) choices.push(choiceText);
            }
            return choices.slice(0, 4);
        }

        function buildFallbackChoices(userText, state) {
            const age = Math.floor((state?.age || 0) / 12);
            const month = state?.currentMonth || 1;
            const generic = ["继续观察局势", "和家人聊聊", "查看当前状态"];
            if (String(userText).includes("学习")) return ["继续学习30分钟", "向老师提问", "休息后继续"];
            if (String(userText).includes("工作")) return ["先处理手头任务", "和同事沟通进度", "复盘今天安排"];
            if (month % 3 === 0) return ["推进到下一月", "整理本季目标", "和重要NPC互动"];
            if (age < 12) return ["继续观察父母", "在家里活动", "安静休息"];
            return generic;
        }

        function ensureOptionsBlock(text, userText, state) {
            const currentChoices = extractChoices(text);
            if (currentChoices.length > 0) return text;
            const fallback = buildFallbackChoices(userText, state);
            const optionBlock = ["", "**可选行动**", ...fallback.map((item, idx) => `${idx + 1}. ${item}`)].join("\n");
            return `${String(text || "").trim()}\n${optionBlock}`;
        }

        return { extractChoices, ensureOptionsBlock };
    })();

            if (/帮|可以吗|能否/.test(text)) return `我可以试试看，先把细节告诉我吧。`;

        }

        function applyUserMessage(state, npcId, userText) {
            const npc = (state.npcs || []).find((n) => n.id === npcId);
            if (!npc) return null;
            const chatList = ensureNpcChatStore(state, npcId);
            chatList.push({ from: "me", text: userText, ts: Date.now() });

            const reply = generateNpcReply(npc, userText);
            chatList.push({ from: "npc", text: reply, ts: Date.now() });

            const delta = calcFavorDelta(userText);
            npc.favor = Math.max(0, Math.min(100, npc.favor + delta));
            npc.status = "在线";

            return { npc, reply, delta };
        }

        return { applyUserMessage };
    })();

    const ChatService = (() => {
        let isGenerating = false;
        async function requestAI(userText) {
            const state = StateService.get();
            const config = SettingsService.getApiConfig();
            if (!config.upstreamUrl || !config.key || !config.model) {
                alert("请先配置上游 API URL、API Key 和模型名。");
                return;
            }

            let upstreamUrl = config.upstreamUrl;
            if (upstreamUrl.endsWith("/")) upstreamUrl = upstreamUrl.slice(0, -1);
            let proxyBase = AppConfig.proxy.baseUrl;
            if (proxyBase.endsWith("/")) proxyBase = proxyBase.slice(0, -1);
            const fetchUrl = `${proxyBase}/chat/completions`;

            isGenerating = true;
            UIRenderer.setSendingDisabled(true);
            UIRenderer.appendMessage("ai", "黑猫猫正在思考中...", Utils.nowDateStr(state), true);
            let fullText = "";

            const recentHistory = state.history
                .slice(-14)
                .map((item) => `${item.role === "user" ? "玩家" : "系统"}(${item.date})：${item.text}`)
                .join("\n");
            const scenarioSpec = SettingsService.getScenarioText();
            const builtinRules = BuiltinPromptService.getResponseRules();
            const runtimeContext = [
                "【运行时上下文】",
                `主角基础：姓名${state.name}，性别${state.gender}，年龄${Math.floor(state.age / 12)}岁，时间${Utils.nowDateStr(state)}。`,
                "请使用Markdown输出并兼容手机屏。"
            ].join("\n");
            const systemPrompt = `${scenarioSpec}\n\n${builtinRules}\n\n${runtimeContext}`;
            const requestHeaders = {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${config.key}`,
                "X-Upstream-Base-URL": upstreamUrl,
                "X-Target-Base-URL": upstreamUrl,
                "X-OpenAI-Base-URL": upstreamUrl
            };

            try {
                const response = await fetch(fetchUrl, {
                    method: "POST",
                    headers: requestHeaders,
                    body: JSON.stringify({
                        model: config.model,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `玩家最新输入：${userText}\n\n最近记录：\n${recentHistory}` }
                        ],
                        stream: true,
                        temperature: 0.7
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let tail = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    tail += decoder.decode(value, { stream: true });
                    const lines = tail.split("\n");
                    tail = lines.pop() || "";
                    for (const line of lines) {
                        if (!line.startsWith("data: ") || line === "data: [DONE]") continue;
                        try {
                            const payload = JSON.parse(line.slice(6));
                            const token = payload.choices?.[0]?.delta?.content || "";
                            if (!token) continue;
                            fullText += token;
                            UIRenderer.updateStreaming(fullText);
                        } catch (e) {
                        }
                    }
                }

                const rawText = fullText.trim() || "（AI想法：刚刚有点卡住了，再和我说一次吧喵）";
                let finalText = rawText;
                const hasNumberedChoices = ChoiceService.extractChoices(rawText).length > 0;

                // 严格模式：如果首轮没有编号选项，自动重试一次（非流式）
                if (!hasNumberedChoices) {
                    try {
                        const retryResponse = await fetch(fetchUrl, {
                            method: "POST",
                            headers: requestHeaders,
                            body: JSON.stringify({
                                model: config.model,
                                messages: [
                                    { role: "system", content: systemPrompt },
                                    {
                                        role: "user",
                                        content: [
                                            `玩家最新输入：${userText}`,
                                            `最近记录：\n${recentHistory}`,
                                            "请严格重写上一条回复，必须在结尾提供1-3条编号选项。",
                                            "格式强制为：1. ... 2. ... 3. ...",
                                            "不要解释规则，直接输出剧情正文和编号选项。",
                                            `上一版草稿（缺少编号选项）：\n${rawText}`
                                        ].join("\n\n")
                                    }
                                ],
                                stream: false,
                                temperature: 0.7
                            })
                        });

                        if (retryResponse.ok) {
                            const retryJson = await retryResponse.json();
                            const retriedText = retryJson?.choices?.[0]?.message?.content?.trim();
                            if (retriedText) {
                                finalText = retriedText;
                            }
                        }
                    } catch (retryError) {
                    }
                }

                // 若重试后仍无编号选项，继续用兜底自动补齐
                finalText = ChoiceService.ensureOptionsBlock(finalText, userText, state);
                UIRenderer.finishStreaming(finalText);
                EventService.maybeTriggerAnimation(finalText);
                StateService.pushHistory({ role: "ai", date: Utils.nowDateStr(StateService.get()), text: finalText });
                StateService.pushChat("assistant", finalText);
                StateService.save();
            } catch (error) {
                UIRenderer.finishStreaming(`⚠️ 连接失败：${error.message}\n\n请检查 API 配置后重试。`);
            } finally {
                isGenerating = false;
                UIRenderer.setSendingDisabled(false);
            }
        }
        function getIsGenerating() {
            return isGenerating;
        }
        return { requestAI, getIsGenerating };
    })();

    const Controller = (() => {
        let activeView = "view-main";
        function renderAll() {
            const state = StateService.get();
            UIRenderer.renderTop(state);
            UIRenderer.renderHistory(state.history);
            UIRenderer.renderInventory(state);
            UIRenderer.renderSocialList(state);
            UIRenderer.renderSaveSlots(state);
            switchView(activeView, true);
        }
        function init() {
            StateService.init();
            SettingsService.loadToUI();
            renderAll();
            VisualEffects.createBears();
            bindEvents();
        }
        function bindEvents() {
            const input = document.getElementById("chat-input");
            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    onSendClick();
                }
            });
        }
        function onSendClick() {
            const input = document.getElementById("chat-input");
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            sendUserText(text);
        }
        function sendUserText(text) {
            if (ChatService.getIsGenerating()) return;
            const state = StateService.get();
            UIRenderer.appendMessage("user", text, Utils.nowDateStr(state), false);
            StateService.pushHistory({ role: "user", date: Utils.nowDateStr(state), text });
            StateService.pushChat("user", text);
            StateService.advanceMonthIfNeeded(text);
            StateService.save();
            renderAll();
            ChatService.requestAI(text);
        }
        function jumpWeek(delta) {
            StateService.jumpWeek(delta);
            renderAll();
            StateService.save();
            sendUserText(delta > 0 ? "下一周" : "上一周");
        }
        function switchView(viewId, silent = false) {
            activeView = viewId;
            document.querySelectorAll(".view-section").forEach((el) => el.classList.remove("active"));
            const target = document.getElementById(viewId);
            if (target) target.classList.add("active");
            document.querySelectorAll(".nav-btn").forEach((btn) => {
                if (btn.dataset.view === viewId) btn.classList.add("active");
                else btn.classList.remove("active");
            });
            if (!silent && viewId === "view-main") {
                const content = document.getElementById("main-content");
                content.scrollTop = content.scrollHeight;
            }
        }
        function openInfoModal(title, desc, actionText, onAction) {
            document.getElementById("info-modal-title").innerText = title;
            document.getElementById("info-modal-desc").innerHTML = desc;
            const actionBtn = document.getElementById("info-modal-action");
            if (actionText && onAction) {
                actionBtn.style.display = "block";
                actionBtn.innerText = actionText;
                actionBtn.onclick = () => {
                    onAction();
                    closeInfoModal();
                };
            } else {
                actionBtn.style.display = "none";
            }
            document.getElementById("info-modal").style.display = "flex";
        }
        function closeInfoModal() {
            document.getElementById("info-modal").style.display = "none";
        }
        function openItemModal(itemId) {
            const state = StateService.get();
            const item = (state.inventory || []).find((it) => it.id === itemId);
            if (!item) return;
            const desc = `类型：${item.type}<br>数量：${item.count}<br>效果：${item.effect}<br>描述：${item.desc}`;
            openInfoModal(`物品：${item.name}`, desc, "使用", () => useItem(itemId));
        }
        function useItem(itemId) {
            const state = StateService.get();
            const item = (state.inventory || []).find((it) => it.id === itemId);
            if (!item || item.count <= 0) return;
            item.count -= 1;
            if (item.effect.includes("health")) state.stats.health = Math.min(100, state.stats.health + 2);
            if (item.effect.includes("charisma")) state.stats.charisma = Math.min(100, state.stats.charisma + 1);
            if (item.count <= 0) {
                state.inventory = state.inventory.filter((it) => it.id !== itemId);
            }
            StateService.pushHistory({ role: "ai", date: Utils.nowDateStr(state), text: `你使用了 **${item.name}**，状态发生了细微变化。` });
            StateService.save();
            renderAll();
            switchView("view-inventory");
        }
        function openNpcProfile(npcId) {
            const state = StateService.get();
            const npc = (state.npcs || []).find((n) => n.id === npcId);
            if (!npc) return;
            openInfoModal(`NPC：${npc.name}`, `关系：${npc.relation}<br>好感度：${npc.favor}<br>状态：${npc.status}<br>心情：${npc.mood}`);
        }
        function sendNpcMessage() {
            const state = StateService.get();
            const panelTitle = document.getElementById("social-chat-title");
            if (!panelTitle || panelTitle.innerText.indexOf("和 ") !== 0) return;
            const npcName = panelTitle.innerText.replace("和 ", "").replace(" 聊天", "");
            const npc = (state.npcs || []).find((n) => n.name === npcName);
            if (!npc) return;
            const input = document.getElementById("social-input");
            const txt = input.value.trim();
            if (!txt) return;
            NpcChatService.applyUserMessage(state, npc.id, txt);
            input.value = "";
            StateService.save();
            renderAll();
            switchView("view-social");
            UIRenderer.renderSocialChat(state, npc.id);
        }
        function saveToSlot(index) {
            const state = StateService.get();
            SaveSlotService.saveToSlot(index, state);
            renderAll();
            switchView("view-saves");
        }
        function loadFromSlot(index) {
            const saved = SaveSlotService.loadFromSlot(index);
            if (!saved?.state) return;
            StorageService.writeJson(AppConfig.storageKeys.save, saved.state);
            StateService.init();
            renderAll();
            switchView("view-main");
        }
        function deleteSlot(index) {
            SaveSlotService.deleteSlot(index);
            renderAll();
            switchView("view-saves");
        }
        function saveSettings() {
            SettingsService.saveFromUI();
            alert("配置已保存");
        }
        function importScenarioTxt() {
            SettingsService.importScenarioFromFile();
        }
        function openRebornModal() {
            document.getElementById("reborn-modal").style.display = "flex";
        }
        function closeRebornModal() {
            document.getElementById("reborn-modal").style.display = "none";
        }
        function resetGameWithGender(gender) {
            StateService.resetWithGender(gender);
            closeRebornModal();
            renderAll();
        }
        function toggleConfig() {
            const body = document.getElementById("config-body");
            const arrow = document.getElementById("config-arrow");
            const open = body.style.display === "block";
            body.style.display = open ? "none" : "block";
            arrow.innerText = open ? "▼" : "▲";
        }
        return { init, onSendClick, sendUserText, jumpWeek, switchView, saveSettings, importScenarioTxt, openRebornModal, closeRebornModal, resetGameWithGender, openItemModal, useItem, openNpcProfile, sendNpcMessage, saveToSlot, loadFromSlot, deleteSlot, closeInfoModal, toggleConfig };
    })();

    function onSendClick() { Controller.onSendClick(); }
    function sendUserText(text) { Controller.sendUserText(text); }
    function jumpWeek(delta) { Controller.jumpWeek(delta); }
    function switchView(viewId) { Controller.switchView(viewId); }
    function saveSettings() { Controller.saveSettings(); }
    function importScenarioTxt() { Controller.importScenarioTxt(); }
    function openRebornModal() { Controller.openRebornModal(); }
    function closeRebornModal() { Controller.closeRebornModal(); }
    function resetGameWithGender(gender) { Controller.resetGameWithGender(gender); }
    function sendNpcMessage() { Controller.sendNpcMessage(); }
    function closeInfoModal() { Controller.closeInfoModal(); }
    function toggleConfig() { Controller.toggleConfig(); }

    window.onload = () => Controller.init();
</script>
</body>
</html>
